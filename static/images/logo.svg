<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bridge-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bridge-grad)"/>
  <!-- Bridge arch -->
  <path d="M12 42 Q32 18 52 42" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bridge towers -->
  <line x1="22" y1="32" x2="22" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="32" x2="42" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bridge deck -->
  <line x1="8" y1="48" x2="56" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cables -->
  <line x1="22" y1="32" x2="14" y2="42" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="22" y1="32" x2="30" y2="38" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="32" x2="34" y2="38" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="42" y1="32" x2="50" y2="42" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Book on bridge -->
  <rect x="27" y="22" width="10" height="8" rx="1" fill="white" opacity="0.9"/>
  <line x1="32" y1="22" x2="32" y2="30" stroke="#0F766E" stroke-width="1"/>
</svg>
